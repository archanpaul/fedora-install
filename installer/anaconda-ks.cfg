btrfs none btrfs.123
btrfs /opt --subvol --name=@opt 
btrfs /home --subvol --name=@home 
btrfs / --subvol --name=@ 
btrfs /snapshots --subvol --name=@snapshots 
btrfs /var --subvol --name=@var

